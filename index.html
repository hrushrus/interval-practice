<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musical Ear Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- VexFlow for rendering sheet music -->
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <!-- Tone.js for audio playback -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <!-- Chart.js for progress trend -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
    <div id="user-overlay" class="overlay">
        <div class="overlay-content">
            <h2>Welcome! Who is practicing?</h2>
            <div class="user-buttons">
                <button id="sophie-btn" class="user-select-btn sophie-theme">Sophie</button>
                <button id="chris-btn" class="user-select-btn chris-theme">Chris</button>
            </div>
        </div>
    </div>

    <!-- Rankings Overlay -->
    <div id="rankings-overlay" class="overlay hidden">
        <div class="overlay-content rankings-content">
            <h2>🏆 Top Scorers</h2>
            <div class="table-container">
                <table id="rankings-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>User</th>
                            <th>Score</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="rankings-body">
                        <!-- Rows added by JS -->
                    </tbody>
                </table>
            </div>
            <button id="close-rankings-btn" class="primary-btn">Close</button>
        </div>
    </div>

    <!-- Progress Overlay -->
    <div id="progress-overlay" class="overlay hidden">
        <div class="overlay-content rankings-content">
            <h2>📈 Progress Trend</h2>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem;">Average score over time per user</p>
            <div class="chart-container" style="position: relative; height:300px; width:100%; margin-bottom: 1.5rem;">
                <canvas id="progress-chart"></canvas>
            </div>
            <button id="close-progress-btn" class="primary-btn">Close</button>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="header-top">
                <h1 id="app-title">Sophie and Chris' Musical Ear Practice</h1>
                <div class="header-actions">
                    <button id="view-progress-btn" class="icon-btn">📈 Progress</button>
                    <button id="view-rankings-btn" class="icon-btn">🏆 Rankings</button>
                    <button id="switch-user-btn" class="switch-btn">Switch User</button>
                </div>
            </div>
            <div class="score-board">
                <span>Score: <span id="score">0</span></span>
                <span>Streak: <span id="streak">0</span></span>
                <span>Best: <span id="best-streak">0</span></span>
                <div class="board-actions">
                    <button id="end-session-btn" class="save-link">End Session</button>
                    <button id="reset-btn" class="reset-link">Reset</button>
                </div>
            </div>
        </header>

        <div class="controls">
            <div class="control-group">
                <label for="training-select">Training:</label>
                <select id="training-select">
                    <option value="intervals">Intervals</option>
                    <option value="chords">Chords</option>
                    <option value="scales">Scales</option>
                    <option value="pitch">Perfect Pitch</option>
                    <option value="rhythm">Rhythm Recognition</option>
                </select>
            </div>
            <div class="control-group">
                <label for="mode-select">Mode:</label>
                <select id="mode-select">
                    <option value="audio">Ear Training</option>
                    <option value="visual">Sight Reading</option>
                </select>
            </div>
            <div class="control-group">
                <label for="playback-select">Playback:</label>
                <select id="playback-select">
                    <option value="melodic">Melodic</option>
                    <option value="harmonic">Harmonic</option>
                </select>
            </div>
        </div>

        <main class="display-area">
            <!-- Time Signature Announcement -->
            <div id="rhythm-announcement" class="rhythm-announcement hidden">
                <span id="ts-display">4/4</span>
            </div>

            <!-- Audio UI -->
            <div id="audio-ui" class="active">
                <button id="play-btn" class="primary-btn">Play Challenge</button>
            </div>

            <!-- Visual UI -->
            <div id="visual-ui" class="hidden">
                <div id="staff-container"></div>
            </div>
        </main>

        <section class="input-area">
            <h2 id="challenge-question">What interval is this?</h2>
            <div id="button-grid" class="button-grid">
                <!-- Buttons will be generated dynamically by app.js -->
            </div>
            <!-- Rhythm Input Panel -->
            <div id="rhythm-input-ui" class="hidden">
                <div class="rhythm-palette-container">
                    <div id="rhythm-palette-notes" class="button-grid rhythm-palette">
                        <button class="interval-btn rhythm-note-btn" data-type="w" title="Whole Note">
                            <svg viewBox="0 0 30 20" class="note-icon"><ellipse cx="15" cy="10" rx="10" ry="7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                        </button>
                        <button class="interval-btn rhythm-note-btn" data-type="h" title="Half Note">
                            <svg viewBox="0 0 30 45" class="note-icon"><ellipse cx="10" cy="35" rx="8" ry="6" fill="none" stroke="currentColor" stroke-width="2"/><line x1="18" y1="35" x2="18" y2="5" stroke="currentColor" stroke-width="2"/></svg>
                        </button>
                        <button class="interval-btn rhythm-note-btn" data-type="q" title="Quarter Note">
                            <svg viewBox="0 0 30 45" class="note-icon"><ellipse cx="10" cy="35" rx="8" ry="6" fill="currentColor"/><line x1="18" y1="35" x2="18" y2="5" stroke="currentColor" stroke-width="2"/></svg>
                        </button>
                        <button class="interval-btn rhythm-note-btn" data-type="8" title="Eighth Note">
                            <svg viewBox="0 0 35 45" class="note-icon"><ellipse cx="10" cy="35" rx="8" ry="6" fill="currentColor"/><line x1="18" y1="35" x2="18" y2="5" stroke="currentColor" stroke-width="2"/><path d="M18,5 Q30,15 25,25" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                        </button>
                        <button class="interval-btn rhythm-note-btn" data-type="16" title="Sixteenth Note">
                            <svg viewBox="0 0 35 45" class="note-icon"><ellipse cx="10" cy="35" rx="8" ry="6" fill="currentColor"/><line x1="18" y1="35" x2="18" y2="5" stroke="currentColor" stroke-width="2"/><path d="M18,5 Q30,15 25,20" fill="none" stroke="currentColor" stroke-width="2"/><path d="M18,12 Q30,22 25,27" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                        </button>
                    </div>
                    <div id="rhythm-palette-rests" class="button-grid rhythm-palette">
                        <button class="interval-btn rhythm-note-btn" data-type="wr" title="Whole Rest">
                            <svg viewBox="0 0 30 30" class="note-icon"><line x1="5" y1="10" x2="25" y2="10" stroke="currentColor" stroke-width="1"/><rect x="8" y="10" width="14" height="7" fill="currentColor"/></svg>
                        </button>
                        <button class="interval-btn rhythm-note-btn" data-type="hr" title="Half Rest">
                            <svg viewBox="0 0 30 30" class="note-icon"><line x1="5" y1="20" x2="25" y2="20" stroke="currentColor" stroke-width="1"/><rect x="8" y="13" width="14" height="7" fill="currentColor"/></svg>
                        </button>
                        <button class="interval-btn rhythm-note-btn" data-type="qr" title="Quarter Rest">
                            <svg viewBox="0 0 20 40" class="note-icon"><path d="M10,5 L15,15 L5,20 L15,25 L10,35" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                        </button>
                        <button class="interval-btn rhythm-note-btn" data-type="8r" title="Eighth Rest">
                            <svg viewBox="0 0 20 40" class="note-icon"><circle cx="8" cy="15" r="3" fill="currentColor"/><path d="M8,15 Q15,15 10,35" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                        </button>
                        <button class="interval-btn rhythm-note-btn" data-type="16r" title="Sixteenth Rest">
                            <svg viewBox="0 0 20 40" class="note-icon"><circle cx="8" cy="12" r="3" fill="currentColor"/><circle cx="6" cy="20" r="3" fill="currentColor"/><path d="M8,12 Q15,12 10,35 M6,20 Q13,20 8,30" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                        </button>
                    </div>
                </div>
                <div class="rhythm-actions">
                    <button id="rhythm-undo-btn" class="icon-btn">Undo</button>
                    <button id="rhythm-clear-btn" class="icon-btn">Clear All</button>
                    <button id="rhythm-submit-btn" class="primary-btn">Submit Answer</button>
                </div>
            </div>
        </section>
        
        <div id="feedback" class="feedback-msg"></div>
        <div class="next-area">
            <button id="next-btn" class="primary-btn hidden">Next Challenge</button>
        </div>
        <p class="sound-tip">Tip: If no sound, check your iPhone's silent switch!</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
